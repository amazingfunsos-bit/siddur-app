<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>סידור — Tefilah Player</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4efe4;
  --white:#fff;
  --sidebar:#12100c;
  --gold:#c8981e;
  --gold2:#e8c455;
  --gold-dim:#7a6010;
  --ink:#1a1208;
  --ink2:#3a2a10;
  --muted:#888070;
  --border:#ddd0b5;
  --highlight:#ffe066;
  --played:#1a3f8f;
  --he:'Frank Ruhl Libre',serif;
  --ui:'Assistant',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--ui);-webkit-font-smoothing:antialiased}
#app{display:flex;height:100dvh;overflow:hidden}

/* ── SIDEBAR ── */
#sb{width:252px;flex-shrink:0;background:var(--sidebar);display:flex;flex-direction:column;overflow:hidden}
.sb-logo{padding:16px 16px 13px;border-bottom:1px solid rgba(200,152,30,.18);flex-shrink:0}
.sb-logo-he{font-family:var(--he);font-size:1.85rem;font-weight:900;color:var(--gold2);letter-spacing:.03em;line-height:1}
.sb-logo-en{font-family:var(--ui);font-size:.58rem;color:var(--gold-dim);letter-spacing:.22em;text-transform:uppercase;margin-top:3px}
.sb-hd{font-family:var(--ui);font-size:.58rem;font-weight:700;color:var(--gold-dim);letter-spacing:.2em;text-transform:uppercase;padding:11px 16px 5px;flex-shrink:0}
#menu{flex:1;overflow-y:auto;padding-bottom:8px}
#menu::-webkit-scrollbar{width:4px}
#menu::-webkit-scrollbar-thumb{background:rgba(200,152,30,.3);border-radius:2px}
.mi{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;border-right:3px solid transparent;transition:background .1s;user-select:none}
.mi:hover{background:rgba(255,255,255,.06)}
.mi.active{background:rgba(200,152,30,.12);border-right-color:var(--gold2)}
.mi.soon{opacity:.38;cursor:default}
.mi-num{font-family:var(--ui);font-size:.58rem;font-weight:700;color:rgba(200,152,30,.3);min-width:24px;flex-shrink:0}
.mi.active .mi-num{color:var(--gold2)}
.mi-texts{min-width:0}
.mi-he{font-family:var(--he);font-size:.92rem;font-weight:700;color:#d8ccb4;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-en{font-family:var(--ui);font-size:.6rem;color:var(--gold-dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi.active .mi-he{color:var(--gold2)}
.mi.active .mi-en{color:#c8a030}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── TOPBAR ── */
#topbar{background:var(--white);border-bottom:1px solid var(--border);padding:9px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.tb-info{min-width:0;flex:1}
.tb-title{font-family:var(--he);font-size:1.2rem;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-sub{font-family:var(--ui);font-size:.64rem;color:var(--muted);margin-top:1px}

/* ── TEXT AREA ── */
#text-area{
  flex:1;overflow-y:auto;padding:24px 32px 16px;
  scroll-behavior:smooth;
  background:var(--bg);
}
#text-area::-webkit-scrollbar{width:5px}
#text-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.block{margin-bottom:20px}
.block-label{
  font-family:var(--ui);font-size:.6rem;font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.block-label::after{content:'';flex:1;height:1px;background:var(--border)}
.prayer-text{
  font-family:var(--he);font-size:1.65rem;line-height:2.1;
  text-align:right;direction:rtl;color:var(--ink);
}

/* word highlighting */
.w{
  cursor:pointer;border-radius:3px;padding:0 2px;
  transition:background .07s;display:inline;
}
.w:hover{background:rgba(200,152,30,.2)}
.w.now{
  background:var(--highlight);
  box-shadow:0 0 0 1.5px rgba(180,130,0,.5);
  border-radius:3px;
}
.w.done{color:var(--played)}

/* welcome screen */
#welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;padding:32px;text-align:center;
}
.wlc-he{font-family:var(--he);font-size:3rem;font-weight:900;color:var(--ink)}
.wlc-sub{font-family:var(--ui);font-size:.85rem;color:var(--muted)}
.wlc-hint{font-family:var(--ui);font-size:.75rem;color:var(--gold);
  background:rgba(200,152,30,.08);border:1px solid rgba(200,152,30,.2);
  border-radius:8px;padding:10px 18px}

/* ── PLAYER BAR ── */
#player{
  background:var(--sidebar);
  border-top:1px solid rgba(200,152,30,.15);
  padding:8px 16px 10px;
  flex-shrink:0;display:flex;flex-direction:column;gap:6px;
}

/* progress */
#prog-wrap{
  height:5px;background:rgba(255,255,255,.1);border-radius:3px;
  cursor:pointer;position:relative;
}
#prog-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(to left,var(--gold),var(--gold2));
  width:0%;pointer-events:none;
}
#prog-thumb{
  position:absolute;top:50%;right:0%;
  width:13px;height:13px;border-radius:50%;
  background:var(--gold2);border:2px solid #fff;
  transform:translate(50%,-50%);pointer-events:none;
}

/* controls */
#ctrls{display:flex;align-items:center;gap:5px}
.cb{
  background:transparent;border:none;color:rgba(255,255,255,.6);
  cursor:pointer;font-size:1rem;width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;flex-shrink:0;
}
.cb:hover{color:#fff;background:rgba(255,255,255,.1)}
.cb:active{transform:scale(.9)}
.cb:disabled{opacity:.28;cursor:default;transform:none}
#play-btn{width:40px;height:40px;background:var(--gold);border-radius:50%;color:#fff;font-size:1.1rem;flex-shrink:0}
#play-btn:hover:not(:disabled){background:var(--gold2);color:var(--ink)}
.td{font-family:var(--ui);font-size:.64rem;color:rgba(255,255,255,.35);white-space:nowrap;flex-shrink:0}
.csp{flex:1}
#tnm{font-family:var(--he);font-size:.88rem;color:rgba(255,255,255,.65);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;flex-shrink:0}

/* speed */
#spd-grp{
  display:flex;align-items:center;gap:2px;
  background:rgba(255,255,255,.07);border:1px solid rgba(200,152,30,.22);
  border-radius:18px;padding:2px;flex-shrink:0;
}
.sp-btn{
  background:transparent;border:none;
  color:rgba(255,255,255,.4);font-family:var(--ui);font-size:.6rem;font-weight:700;
  padding:3px 7px;border-radius:14px;cursor:pointer;transition:all .12s;white-space:nowrap;
}
.sp-btn:hover{color:#fff}
.sp-btn.on{background:var(--gold);color:#fff}

@media(max-width:600px){
  #sb{display:none}
  .td{display:none}
  #tnm{max-width:90px}
  #text-area{padding:16px 14px}
  .prayer-text{font-size:1.4rem}
}
</style>
</head>

<div id="app">

<!-- SIDEBAR -->
<div id="sb">
  <div class="sb-logo">
    <div class="sb-logo-he">סידור</div>
    <div class="sb-logo-en">Tefilah Player</div>
  </div>
  <div class="sb-hd">Shacharit · שַׁחֲרִית</div>
  <div id="menu"></div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div class="tb-info">
      <div class="tb-title" id="ttl">סידור — Tefilah Player</div>
      <div class="tb-sub" id="tsub">Select a prayer to begin</div>
    </div>
  </div>

  <!-- Text display -->
  <div id="text-area">
    <div id="welcome">
      <div class="wlc-he">סִדּוּר</div>
      <div class="wlc-sub">Shacharit · Morning Prayers</div>
      <div class="wlc-hint">👈 Select a prayer from the sidebar to see the text and play the recording</div>
    </div>
    <div id="pdisplay" style="display:none"></div>
  </div>

  <!-- Player -->
  <div id="player">
    <div id="prog-wrap">
      <div id="prog-fill"></div>
      <div id="prog-thumb"></div>
    </div>
    <div id="ctrls">
      <button class="cb" id="b-prev" disabled title="Previous">⏮</button>
      <button class="cb" id="b-rew"  disabled title="−5s">⏪</button>
      <button class="cb" id="play-btn" disabled>▶</button>
      <button class="cb" id="b-fwd"  disabled title="+5s">⏩</button>
      <button class="cb" id="b-next" disabled title="Next">⏭</button>
      <span class="td" id="td">0:00 / 0:00</span>
      <div class="csp"></div>
      <span id="tnm">—</span>
      <div id="spd-grp">
        <button class="sp-btn" data-s="0.75">0.75×</button>
        <button class="sp-btn on" data-s="1">1×</button>
        <button class="sp-btn" data-s="1.25">1.25×</button>
        <button class="sp-btn" data-s="1.5">1.5×</button>
        <button class="sp-btn" data-s="2">2×</button>
        <button class="sp-btn" data-s="3">3×</button>
        <button class="sp-btn" data-s="4">4×</button>
      </div>
    </div>
  </div>
</div>
</div>

      {t:'וְאָמַר',s:12.8},{t:'כָּל-הָעָם',s:13.2},{t:'אָמֵן',s:13.8},{t:'הַלְלוּיָהּ.',s:14.3},

},
{

      {t:'כִּי',s:7.6},{t:'אֵין',s:7.9},{t:'בִּלְתֶּךָ,',s:8.3},

// ── Prayers that don't have audio yet (remaining 23) ──
const COMING_SOON = [
  { num:'26',  he:'הוֹשִׁיעֵנוּ',                     en:'Hoshieinu' },
  { num:'38',  he:'בָּרוּךְ ה׳ לְעוֹלָם',             en:'Baruch Hashem LeOlam' },
  { num:'43',  he:'יִשְׁתַּבַּח',                     en:'Yishtabach' },
  { num:'46',  he:'תִּתְבָּרֵךְ',                     en:'Tisbareich' },
  { num:'49',  he:'לָאֵ-ל בָּרוּךְ',                  en:'LaKeil Baruch' },
  { num:'52',  he:'וְהָיָה',                          en:'VeHayah' },
  { num:'55',  he:'אֶל הָרִאשׁוֹנִים',               en:'Al HaRishonim' },
  { num:'58',  he:'שְׁמוֹנֶה עֶשְׂרֵה',              en:'Shmoneh Esrei' },
  { num:'66',  he:'אָבִינוּ מַלְכֵּנוּ',              en:'Avinu Malkeinu' },
  { num:'69',  he:'לַמְנַצֵּחַ יַעַנְךָ',            en:'Lamnatzeach Yaancha' },
  { num:'72',  he:'בֵּית יַעֲקֹב',                   en:'Bais Yaakov' },
  { num:'73c', he:'שִׁיר שֶׁל יוֹם — שלישי',         en:'Shir Shel Yom — Tuesday' },
  { num:'73f', he:'שִׁיר שֶׁל יוֹם — שישי',          en:'Shir Shel Yom — Friday' },
  { num:'76',  he:'עָלֵינוּ',                         en:'Aleinu' },
  { num:'77',  he:'שֵׁשׁ זְכִירוֹת',                 en:'Sheis Zechiros' },
];

// ── Audio path — for Vercel put MP3s in public/audio/ ──
const AUDIO_BASE = 'audio/';

// ── State ──
const aud = document.getElementById('aud');
let cur = -1, wIdx = -1, playing = false, spd = 1, raf = null;
let allW = [];

// ── Build Sidebar ──
function buildMenu() {
  const m = document.getElementById('menu');
  m.innerHTML = '';

  // Available prayers
  PRAYERS.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'mi' + (i === cur ? ' active' : '');
    el.innerHTML = `<div class="mi-num">${p.num}</div><div class="mi-texts"><div class="mi-he">${p.he}</div><div class="mi-en">${p.en}</div></div>`;
    el.onclick = () => load(i);
    m.appendChild(el);
    if (i === cur) setTimeout(() => el.scrollIntoView({ block: 'nearest' }), 0);
  });

  // Coming soon
  if (COMING_SOON.length) {
    const lbl = document.createElement('div');
    lbl.className = 'sb-hd';
    lbl.style.marginTop = '12px';
    lbl.textContent = 'Coming Soon';
    m.appendChild(lbl);
    COMING_SOON.forEach(p => {
      const el = document.createElement('div');
      el.className = 'mi soon';
      el.innerHTML = `<div class="mi-num">${p.num}</div><div class="mi-texts"><div class="mi-he">${p.he}</div><div class="mi-en">${p.en}</div></div>`;
      m.appendChild(el);
    });
  }
}

// ── Load prayer ──
function load(idx) {
  stop();
  cur = idx; wIdx = -1; allW = [];
  const p = PRAYERS[idx];

  document.getElementById('ttl').textContent = p.he;
  document.getElementById('tsub').textContent = `תְּפִלָּה ${p.num} · ${p.en}`;
  document.getElementById('tnm').textContent = p.he;
  document.getElementById('b-prev').disabled = idx === 0;
  document.getElementById('b-next').disabled = idx === PRAYERS.length - 1;
  ['play-btn','b-rew','b-fwd'].forEach(id => document.getElementById(id).disabled = false);

  buildText(p);
  buildMenu();

  aud.src = AUDIO_BASE + p.audio;
  aud.playbackRate = spd;
  aud.load();
  updProg();
}

// ── Build Hebrew text with clickable words ──
function buildText(p) {
  const welcome = document.getElementById('welcome');
  const display = document.getElementById('pdisplay');
  welcome.style.display = 'none';
  display.style.display = 'block';
  display.innerHTML = '';
  allW = [];

  p.blocks.forEach(block => {
    const bd = document.createElement('div');
    bd.className = 'block';
    if (block.label) {
      const lb = document.createElement('div');
      lb.className = 'block-label';
      lb.textContent = block.label;
      bd.appendChild(lb);
    }
    const tx = document.createElement('div');
    tx.className = 'prayer-text';
    block.words.forEach(w => {
      const sp = document.createElement('span');
      sp.className = 'w';
      sp.textContent = w.t + ' ';
      const i = allW.length;
      sp.onclick = () => seekToWord(i);
      tx.appendChild(sp);
      allW.push({ el: sp, s: w.s });
    });
    bd.appendChild(tx);
    display.appendChild(bd);
  });
}

// ── Seek to word on click ──
function seekToWord(i) {
  aud.currentTime = allW[i].s;
  hlWord(i);
  if (!playing) play();
}

// ── Highlight word ──
function hlWord(i) {
  if (wIdx >= 0 && allW[wIdx]) {
    allW[wIdx].el.classList.remove('now');
    allW[wIdx].el.classList.add('done');
  }
  wIdx = i;
  if (i >= 0 && allW[i]) {
    allW[i].el.classList.add('now');
    allW[i].el.classList.remove('done');
    allW[i].el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ── Sync loop ──
function syncLoop() {
  if (!playing) return;
  const t = aud.currentTime;
  let active = -1;
  for (let i = 0; i < allW.length; i++) {
    if (allW[i].s <= t) active = i; else break;
  }
  if (active !== wIdx) hlWord(active);
  updProg();
  raf = requestAnimationFrame(syncLoop);
}

// ── Play / Stop ──
function play() {
  aud.playbackRate = spd;
  aud.play().catch(() => {});
  playing = true;
  document.getElementById('play-btn').textContent = '⏸';
  raf = requestAnimationFrame(syncLoop);
}
function stop() {
  aud.pause();
  playing = false;
  document.getElementById('play-btn').textContent = '▶';
  if (raf) cancelAnimationFrame(raf);
}
function toggle() { playing ? stop() : play(); }

// ── Progress ──
function updProg() {
  const dur = aud.duration || 0, t = aud.currentTime || 0;
  const pct = dur ? (t / dur) * 100 : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-thumb').style.right = (100 - pct) + '%';
  const fmt = s => { const m = Math.floor(s/60), sec = Math.floor(s%60); return m+':'+String(sec).padStart(2,'0'); };
  document.getElementById('td').textContent = fmt(t) + ' / ' + fmt(dur);
}

document.getElementById('prog-wrap').addEventListener('click', e => {
  const r = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - r.left) / r.width;
  if (aud.duration) { aud.currentTime = pct * aud.duration; updProg(); }
});

// ── Controls ──
aud.addEventListener('ended', () => {
  stop();
  if (cur < PRAYERS.length - 1) setTimeout(() => load(cur + 1), 500);
});
aud.addEventListener('timeupdate', updProg);

document.getElementById('play-btn').addEventListener('click', toggle);
document.getElementById('b-prev').addEventListener('click', () => { if (cur > 0) load(cur - 1); });
document.getElementById('b-next').addEventListener('click', () => { if (cur < PRAYERS.length - 1) load(cur + 1); });
document.getElementById('b-rew').addEventListener('click', () => { aud.currentTime = Math.max(0, aud.currentTime - 5); updProg(); });
document.getElementById('b-fwd').addEventListener('click', () => { aud.currentTime = Math.min(aud.duration||0, aud.currentTime + 5); updProg(); });

// Speed
document.querySelectorAll('.sp-btn').forEach(b => {
  b.addEventListener('click', () => {
    spd = parseFloat(b.dataset.s);
    aud.playbackRate = spd;
    document.querySelectorAll('.sp-btn').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
  });
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); if (cur >= 0) toggle(); }
  if (e.key === 'ArrowRight') { aud.currentTime = Math.min(aud.duration||0, aud.currentTime+5); updProg(); }
  if (e.key === 'ArrowLeft')  { aud.currentTime = Math.max(0, aud.currentTime-5); updProg(); }
  if (e.key === 'ArrowUp')    { e.preventDefault(); if (cur > 0) load(cur-1); }
  if (e.key === 'ArrowDown')  { e.preventDefault(); if (cur < PRAYERS.length-1) load(cur+1); }
});

buildMenu();
</script>
