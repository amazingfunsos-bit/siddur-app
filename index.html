<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>סידור — Tefilah Player</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4efe4;
  --white:#fff;
  --sidebar:#12100c;
  --gold:#c8981e;
  --gold2:#e8c455;
  --gold-dim:#7a6010;
  --ink:#1a1208;
  --muted:#888070;
  --border:#ddd0b5;
  --he:'Frank Ruhl Libre',serif;
  --ui:'Assistant',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--ui);-webkit-font-smoothing:antialiased}
#app{display:flex;height:100dvh;overflow:hidden}

/* SIDEBAR */
#sb{width:252px;flex-shrink:0;background:var(--sidebar);display:flex;flex-direction:column;overflow:hidden}
.sb-logo{padding:16px 16px 13px;border-bottom:1px solid rgba(200,152,30,.18);flex-shrink:0}
.sb-logo-he{font-family:var(--he);font-size:1.85rem;font-weight:900;color:var(--gold2);letter-spacing:.03em;line-height:1}
.sb-logo-en{font-family:var(--ui);font-size:.58rem;color:var(--gold-dim);letter-spacing:.22em;text-transform:uppercase;margin-top:3px}
.sb-hd{font-family:var(--ui);font-size:.58rem;font-weight:700;color:var(--gold-dim);letter-spacing:.2em;text-transform:uppercase;padding:11px 16px 5px;flex-shrink:0}
#menu{flex:1;overflow-y:auto;padding-bottom:8px}
#menu::-webkit-scrollbar{width:4px}
#menu::-webkit-scrollbar-thumb{background:rgba(200,152,30,.3);border-radius:2px}
.mi{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;border-right:3px solid transparent;transition:background .1s;user-select:none}
.mi:hover{background:rgba(255,255,255,.06)}
.mi.active{background:rgba(200,152,30,.12);border-right-color:var(--gold2)}
.mi-num{font-family:var(--ui);font-size:.58rem;font-weight:700;color:rgba(200,152,30,.3);min-width:24px;flex-shrink:0}
.mi.active .mi-num{color:var(--gold2)}
.mi-texts{min-width:0}
.mi-he{font-family:var(--he);font-size:.92rem;font-weight:700;color:#d8ccb4;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-en{font-family:var(--ui);font-size:.6rem;color:var(--gold-dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi.active .mi-he{color:var(--gold2)}
.mi.active .mi-en{color:#c8a030}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* TOPBAR */
#topbar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.tb-title{font-family:var(--he);font-size:1.25rem;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-sub{font-family:var(--ui);font-size:.66rem;color:var(--muted);margin-top:1px}
#spd-grp{display:flex;align-items:center;gap:2px;background:rgba(200,152,30,.07);border:1px solid rgba(200,152,30,.2);border-radius:18px;padding:2px;flex-shrink:0}
.sp-btn{background:transparent;border:none;color:var(--muted);font-family:var(--ui);font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:14px;cursor:pointer;transition:all .12s;white-space:nowrap}
.sp-btn:hover{color:var(--ink)}
.sp-btn.on{background:var(--gold);color:#fff}

/* CONTENT */
#content{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* prayer hero */
#prayer-hero{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px 28px;text-align:center;direction:rtl;gap:10px;min-height:0;
}
.pd-num{font-family:var(--ui);font-size:.7rem;font-weight:600;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;min-height:1em}
.pd-he{font-family:var(--he);font-size:2.8rem;font-weight:900;color:var(--ink);line-height:1.2}
.pd-en{font-family:var(--ui);font-size:.88rem;color:var(--muted)}
.hint{font-family:var(--ui);font-size:.72rem;color:var(--gold);background:rgba(200,152,30,.08);border:1px solid rgba(200,152,30,.18);border-radius:6px;padding:8px 16px;margin-top:4px}

/* SC player area */
#sc-wrap{flex-shrink:0;border-top:1px solid var(--border)}

/* nav row */
#sc-nav{display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--bg);border-bottom:1px solid var(--border)}
.nc{background:var(--white);border:1px solid var(--border);color:var(--ink);font-family:var(--ui);font-size:.7rem;padding:5px 12px;border-radius:4px;cursor:pointer;transition:background .12s;white-space:nowrap}
.nc:hover{background:var(--border)}
.nc:disabled{opacity:.3;cursor:default}
#sc-track-name{font-family:var(--he);font-size:.95rem;font-weight:700;color:var(--ink);flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:rtl}

#sc-frame{width:100%;height:166px;border:none;display:block}

@media(max-width:580px){
  #sb{display:none}
  .pd-he{font-size:2rem}
  #sc-frame{height:150px}
  #spd-grp .sp-btn[data-s="0.5"],
  #spd-grp .sp-btn[data-s="0.75"]{display:none}
}
</style>
</head>
<body>
<div id="app">

<div id="sb">
  <div class="sb-logo">
    <div class="sb-logo-he">סידור</div>
    <div class="sb-logo-en">Tefilah Player</div>
  </div>
  <div class="sb-hd">Shacharit · שַׁחֲרִית</div>
  <div id="menu"></div>
</div>

<div id="main">
  <div id="topbar">
    <div style="min-width:0">
      <div class="tb-title" id="ttl">סידור</div>
      <div class="tb-sub" id="tsub">בחר תפילה · Select a prayer</div>
    </div>
    <div id="spd-grp">
      <button class="sp-btn" data-s="0.5">0.5×</button>
      <button class="sp-btn" data-s="0.75">0.75×</button>
      <button class="sp-btn on" data-s="1">1×</button>
      <button class="sp-btn" data-s="1.25">1.25×</button>
      <button class="sp-btn" data-s="1.5">1.5×</button>
      <button class="sp-btn" data-s="2">2×</button>
      <button class="sp-btn" data-s="3">3×</button>
      <button class="sp-btn" data-s="4">4×</button>
    </div>
  </div>

  <div id="content">
    <div id="prayer-hero">
      <div class="pd-num" id="pd-num">&nbsp;</div>
      <div class="pd-he" id="pd-he">בחר תפילה</div>
      <div class="pd-en" id="pd-en">Select a prayer from the sidebar</div>
      <div class="hint">👈 Click any prayer in the sidebar to load it</div>
    </div>

    <div id="sc-wrap">
      <div id="sc-nav">
        <button class="nc" id="b-prev" disabled>⏮ Prev</button>
        <span id="sc-track-name">—</span>
        <button class="nc" id="b-next" disabled>Next ⏭</button>
      </div>
      <iframe id="sc-frame" src="about:blank" allow="autoplay" scrolling="no"></iframe>
    </div>
  </div>
</div>
</div>

<script>
// Real slugs scraped directly from soundcloud.com/binyomin-pelman
// Format: the exact URL path after soundcloud.com/binyomin-pelman/
// These are confirmed from the live page — suffix numbers included
const PRAYERS = [
  { num:'3',   he:'אֱלֹקֵינוּ וֵאלֹקֵי אֲבוֹתֵינוּ', en:'Elokeinu Veilokei Avoseinu', sc:'10992761_tefillah_03_elokeinu_veilokei_avoseinu-28' },
  { num:'4',   he:'וַיְהִי אַחַר',                    en:'Vayehi Achar',               sc:'10992763_tefillah_04_vayehi_achar-27' },
  { num:'26',  he:'הוֹשִׁיעֵנוּ',                     en:'Hoshieinu',                  sc:null },
  { num:'33',  he:'הַלְלוּקָהּ הַלְלִי',              en:'Halelukah Haleli',           sc:null },
  { num:'37',  he:'הַלְלוּקָהּ הַלְלוּ אֵל',          en:'Halelukah Halelu Keil',      sc:null },
  { num:'38',  he:'בָּרוּךְ ה׳ לְעוֹלָם',             en:'Baruch Hashem LeOlam',       sc:null },
  { num:'41',  he:'וַיּוֹשַׁע',                       en:'VaYosha',                    sc:'11002454_tefillah_41_vayosha-24' },
  { num:'42',  he:'אָז יָשִׁיר',                      en:'Az Yashir',                  sc:null },
  { num:'43',  he:'יִשְׁתַּבַּח',                     en:'Yishtabach',                 sc:null },
  { num:'44',  he:'בָּרוּךְ יוֹצֵר',                  en:'Baruch Yotzeir',             sc:'11002461_tefillah_44_baruch_yotzeir-22' },
  { num:'45',  he:'הַמֵּאִיר לָאָרֶץ',                en:'Hameiir LaAretz',            sc:'11002463_tefillah_45_hameiir_laaretz-21' },
  { num:'46',  he:'תִּתְבָּרֵךְ',                     en:'Tisbareich',                 sc:null },
  { num:'47',  he:'אֶת שֵׁם הָאֵ-ל',                 en:'Es Shem HaKel',              sc:'11002467_tefillah_47_es_shem_hakel-20' },
  { num:'48',  he:'קָדוֹשׁ',                          en:'Kadosh',                     sc:'11002469_tefillah_48_kadosh-19' },
  { num:'49',  he:'לָאֵ-ל בָּרוּךְ',                  en:'LaKeil Baruch',              sc:null },
  { num:'50',  he:'אַהֲבַת עוֹלָם',                   en:'Ahavas Olam',                sc:'11002473_tefillah_50_ahavas_olam-18' },
  { num:'51',  he:'שְׁמַע יִשְׂרָאֵל',               en:'Shema Yisrael',              sc:null },
  { num:'52',  he:'וְהָיָה',                          en:'VeHayah',                    sc:null },
  { num:'53',  he:'וַיֹּאמֶר',                        en:'VaYomer',                    sc:'11002480_tefillah_53_vayomer-16' },
  { num:'54',  he:'וְיַצִּיב',                        en:'Vyatziv',                    sc:null },
  { num:'55',  he:'אֶל הָרִאשׁוֹנִים',               en:'Al HaRishonim',              sc:null },
  { num:'56',  he:'עֶזְרַת אֲבוֹתֵינוּ',             en:'Ezras Avoseinu',             sc:null },
  { num:'57',  he:'שִׁירָה חֲדָשָׁה',                en:'Shirah Chadashah',           sc:null },
  { num:'58',  he:'שְׁמוֹנֶה עֶשְׂרֵה',              en:'Shmoneh Esrei',              sc:null },
  { num:'64',  he:'אֱלֹקֵינוּ — תַּחֲנוּן',          en:'Elokeinu — Tachanun',        sc:null },
  { num:'65',  he:'וְהוּא רַחוּם',                   en:'VeHu Rachum',                sc:null },
  { num:'66',  he:'אָבִינוּ מַלְכֵּנוּ',              en:'Avinu Malkeinu',             sc:null },
  { num:'67',  he:'אֵ-ל אֶרֶךְ אַפַּיִם',            en:'Kel Erech Apayim',           sc:null },
  { num:'68',  he:'אַשְׁרֵי',                         en:'Ashrei',                     sc:'11002589_tefillah_68_ashrei-9' },
  { num:'69',  he:'לַמְנַצֵּחַ יַעַנְךָ',            en:'Lamnatzeach Yaancha',        sc:null },
  { num:'70',  he:'וּבָא לְצִיּוֹן',                 en:'Uvuh Letziyon',              sc:null },
  { num:'71',  he:'תְּפִלָּה לְדָוִד',               en:'Tefillah LeDovid',           sc:null },
  { num:'72',  he:'בֵּית יַעֲקֹב',                   en:'Bais Yaakov',                sc:null },
  { num:'73a', he:'שִׁיר שֶׁל יוֹם — ראשון',         en:'Shir Shel Yom — Sunday',     sc:null },
  { num:'73b', he:'שִׁיר שֶׁל יוֹם — שני',           en:'Shir Shel Yom — Monday',     sc:'11002607_tefillah_73_monday_shir_shel_yom-5' },
  { num:'73c', he:'שִׁיר שֶׁל יוֹם — שלישי',         en:'Shir Shel Yom — Tuesday',    sc:null },
  { num:'73d', he:'שִׁיר שֶׁל יוֹם — רביעי',         en:'Shir Shel Yom — Wednesday',  sc:'11002611_tefillah_73_wednesday_shir_shel_yom-4' },
  { num:'73e', he:'שִׁיר שֶׁל יוֹם — חמישי',         en:'Shir Shel Yom — Thursday',   sc:'11002613_tefillah_73_thursday_shir_shel_yom-3' },
  { num:'73f', he:'שִׁיר שֶׁל יוֹם — שישי',          en:'Shir Shel Yom — Friday',     sc:null },
  { num:'74',  he:'הוֹשִׁיעֵנוּ',                    en:'Hoshieinu (post-Shir)',       sc:'11002617_tefillah_74_hoshieinu-2' },
  { num:'75',  he:'קַוֵּה',                           en:'Kavei',                      sc:'11002619_tefillah_75_kavei-1' },
  { num:'76',  he:'עָלֵינוּ',                         en:'Aleinu',                     sc:null },
  { num:'77',  he:'שֵׁשׁ זְכִירוֹת',                 en:'Sheis Zechiros',             sc:null },
];

const USER = 'binyomin-pelman';
let cur = -1, spd = 1;

function scEmbedUrl(sc) {
  const trackUrl = encodeURIComponent(`https://soundcloud.com/${USER}/${sc}`);
  return `https://w.soundcloud.com/player/?url=${trackUrl}&auto_play=true&buying=false&liking=false&download=false&sharing=false&show_artwork=false&show_comments=false&show_playcount=false&show_user=false&hide_related=true&visual=false&color=%23c8981e`;
}

function buildMenu() {
  const m = document.getElementById('menu');
  m.innerHTML = '';
  PRAYERS.forEach((p, i) => {
    const el = document.createElement('div');
    const unavailable = !p.sc;
    el.className = 'mi' + (i === cur ? ' active' : '') + (unavailable ? ' unavailable' : '');
    el.style.opacity = unavailable ? '0.45' : '1';
    el.innerHTML = `<div class="mi-num">${p.num}</div><div class="mi-texts"><div class="mi-he">${p.he}</div><div class="mi-en">${p.en}${unavailable ? ' · soon' : ''}</div></div>`;
    if (!unavailable) el.onclick = () => loadPrayer(i);
    m.appendChild(el);
    if (i === cur) setTimeout(() => el.scrollIntoView({ block: 'nearest' }), 0);
  });
}

function loadPrayer(idx) {
  const p = PRAYERS[idx];
  if (!p.sc) return;
  cur = idx;

  document.getElementById('ttl').textContent = p.he;
  document.getElementById('tsub').textContent = `תְּפִלָּה ${p.num} · ${p.en}`;
  document.getElementById('pd-num').textContent = `תְּפִלָּה ${p.num}`;
  document.getElementById('pd-he').textContent = p.he;
  document.getElementById('pd-en').textContent = p.en;
  document.getElementById('sc-track-name').textContent = `${p.num}. ${p.he}`;

  // Find prev/next that have sc slugs
  const prevIdx = PRAYERS.slice(0, idx).map((x,i)=>({x,i})).filter(o=>o.x.sc).pop()?.i ?? -1;
  const nextIdx = PRAYERS.slice(idx+1).findIndex(x=>x.sc);
  const nextReal = nextIdx >= 0 ? idx + 1 + nextIdx : -1;
  document.getElementById('b-prev').disabled = prevIdx < 0;
  document.getElementById('b-next').disabled = nextReal < 0;
  document.getElementById('b-prev').onclick = () => { if (prevIdx >= 0) loadPrayer(prevIdx); };
  document.getElementById('b-next').onclick = () => { if (nextReal >= 0) loadPrayer(nextReal); };

  // Swap iframe — the only thing that matters
  const frame = document.getElementById('sc-frame');
  frame.src = scEmbedUrl(p.sc);

  buildMenu();
}

// Speed — apply to audio elements; SC iframe is cross-origin so this
// only works if SC happens to inject an <audio> at the top-level document
function applySpeed(s) {
  spd = s;
  document.querySelectorAll('audio').forEach(a => { try { a.playbackRate = s; } catch(e){} });
}
new MutationObserver(() => {
  document.querySelectorAll('audio').forEach(a => { try { a.playbackRate = spd; } catch(e){} });
}).observe(document.documentElement, { childList: true, subtree: true });

document.querySelectorAll('.sp-btn').forEach(b => {
  b.addEventListener('click', () => {
    spd = parseFloat(b.dataset.s);
    document.querySelectorAll('.sp-btn').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    applySpeed(spd);
  });
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp')   { e.preventDefault(); document.getElementById('b-prev').click(); }
  if (e.key === 'ArrowDown') { e.preventDefault(); document.getElementById('b-next').click(); }
});

buildMenu();
</script>
</body>
</html>
